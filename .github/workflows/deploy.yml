name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Runs on pushes to the main branch
  workflow_dispatch:   # Allows you to trigger the workflow manually

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Change to '8.0.x' if you are using the net-8 branch

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish project
        run: dotnet publish -c Release

      # IMPORTANT: If your repository is NOT a User/Organization page (like username.github.io), 
      # you need to update the base href in the generated index.html so assets load correctly on a subpath.
      # Replace 'RaylibWasm' with your exact repository name.
      - name: Fix base href for GitHub Pages subpath
        run: |
          sed -i 's|<base href="/" />|<base href="/RaylibWasm/" />|g' RaylibWasm/bin/Release/net10.0/browser-wasm/AppBundle/index.html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This is the default output folder for .NET 10 browser-wasm apps
          # If you use the net-8 branch, change 'net10.0' to 'net8.0'
          path: 'RaylibWasm/bin/Release/net10.0/browser-wasm/AppBundle'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4